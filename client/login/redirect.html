<!DOCTYPE html>
<html lang="en">
    <head>
        <title>ChitChat - Redirect</title>
    </head>
    <body>
        <script>
            if (localStorage.getItem("loggedIn") == "true" && (localStorage.getItem("username") != null && localStorage.getItem("password") != null)) {
                window.location = `?loggedIn=true&username=${localStorage.getItem("username")}&password=${localStorage.getItem("password")}`;
            } else {
                window.location = "?loggedIn=false"
            }
        </script>
    </body>
</html>
